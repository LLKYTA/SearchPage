<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KD起始页 - iOS 18 风格小组件主页">
  <meta name="theme-color" content="#007AFF">
  <title>KD起始页</title>

  <!-- 外部资源 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="./src/css/variables.css">
  <link rel="stylesheet" href="./src/css/layout.css">
  <link rel="stylesheet" href="./src/css/widgets.css">
  <link rel="stylesheet" href="./src/css/dialogs.css">
</head>

<body class="bg-gradient">
  <!-- iOS 18 风格启动动画 -->
  <div id="splash-screen" class="splash-screen">
    <div class="splash-logo">
      <div class="splash-icon">KD</div>
    </div>
  </div>

  <!-- 背景装饰 -->
  <div class="bg-decoration">
    <div class="bg-bubble bg-bubble-1"></div>
    <div class="bg-bubble bg-bubble-2"></div>
    <div class="bg-bubble bg-bubble-3"></div>
  </div>

  <!-- 主容器（搜索卡片 + 小组件） -->
  <div class="container-main">
    <!-- 搜索卡片（视觉焦点区） -->
    <div class="search-hero">
      <div class="search-card glass" id="searchCard">
        <div class="search-card-row">
          <button class="engine-pill" id="engine-switch" onclick="toggleEngineDropdown()">
            <i class="fa fa-edge" id="engine-inline-icon"></i>
            <span class="engine-name" id="engine-inline-name">Bing</span>
            <i class="fa fa-chevron-down engine-chevron"></i>
          </button>
          <div class="search-card-divider"></div>
          <i class="fa fa-search search-card-icon"></i>
          <input type="text" id="search-input" class="search-input" placeholder="搜索任何内容..." autocomplete="off" spellcheck="false">
          <button id="search-btn" class="search-card-btn">
            <i class="fa fa-arrow-right"></i>
          </button>
        </div>
        <!-- 卡片扩展区（最近搜索 & 搜索建议，浮动面板，不影响小组件布局） -->
        <div class="search-card-expand" id="searchOverlay">
          <div class="search-suggestions" id="searchSuggestions" style="display:none;"></div>
          <div class="search-recents" id="searchRecents" style="display:none;"></div>
        </div>
        <!-- 引擎下拉菜单（JS 动态渲染，与卡片同宽） -->
        <div class="engine-dropdown" id="engine-dropdown"></div>
      </div>
    </div>

    <!-- 小组件区域 -->
    <div class="widgets-area" data-widget-area="main-area" data-default-widgets='[
    {"type":"clock"},{"type":"weather"},{"type":"shortcuts"},{"type":"todo"},
    {"type":"bookmarks"},{"type":"hotboard"}]'>
    </div>
  </div>

  <!-- 底部极简操作栏（纯图标胶囊） -->
  <div class="floating-bar">
    <button class="floating-bar-btn" onclick="toggleDarkMode()" title="切换主题">
      <i id="theme-icon-floating" class="fa fa-moon-o"></i>
    </button>
    <div class="floating-bar-separator"></div>
    <button class="floating-bar-btn" onclick="WidgetFramework.openGallery('main-area')" title="编辑小组件">
      <i class="fa fa-plus-circle"></i>
    </button>
    <div class="floating-bar-separator"></div>
    <button class="floating-bar-btn" onclick="openSettings()" title="设置">
      <i class="fa fa-cog"></i>
    </button>
  </div>

  <!-- 小组件库弹窗（底部弹出，预览式卡片） -->
  <div id="widget-gallery-modal" class="modal-overlay">
    <div class="modal-bottom-sheet">
      <div class="modal-header">
        <div class="modal-title-area">
          <h3 class="modal-title">添加小组件</h3>
          <button class="modal-close-btn">完成</button>
        </div>
      </div>
      <div class="gallery-list"></div>
    </div>
  </div>

  <!-- 设置弹窗 -->
  <div id="settings-modal" class="modal-overlay">
    <div class="modal-content glass setting-modal-content">
      <div class="modal-header">
        <h3 class="modal-title">设置</h3>
        <button class="modal-close">
          <i class="fa fa-times"></i>
        </button>
      </div>

      <div class="settings-body">
        <div class="nav-page-container">
          <!-- ===== 根页面 ===== -->
          <div class="nav-page active" data-page="root">
            <div class="settings-group">
              <div class="settings-group-title">显示与偏好</div>
              <div class="settings-card">
              <div class="setting-row">
                <div class="setting-row-left">
                  <i class="fa fa-paint-brush setting-row-icon"></i>
                  <span class="setting-row-label">主题模式</span>
                </div>
                <div id="theme-segment"></div>
              </div>

              <div class="setting-row setting-row-clickable" onclick="openSearchSettings()">
                <div class="setting-row-left">
                  <i class="fa fa-search setting-row-icon"></i>
                  <span class="setting-row-label">搜索</span>
                </div>
                <i class="fa fa-chevron-right setting-row-arrow"></i>
              </div>

              <div class="setting-row">
                <div class="setting-row-left">
                  <i class="fa fa-image setting-row-icon"></i>
                  <span class="setting-row-label">背景风格</span>
                </div>
                <div id="bg-segment"></div>
              </div>

              <div class="setting-row">
                <div class="setting-row-left">
                  <i class="fa fa-fire setting-row-icon"></i>
                  <span class="setting-row-label">热榜来源</span>
                </div>
                <div class="ui-dropdown" id="settings-hotboard-dd"></div>
              </div>

              <div class="setting-row">
                <div class="setting-row-left">
                  <i class="fa fa-book setting-row-icon"></i>
                  <span class="setting-row-label">单词词库</span>
                </div>
                <div class="ui-dropdown" id="settings-word-dd"></div>
              </div>
            </div>
          </div>

          <!-- 内容管理 -->
          <div class="settings-group">
            <div class="settings-group-title">内容管理</div>
            <div class="settings-card">
              <button class="setting-row setting-row-btn" onclick="openWidgetManager('bookmarks')">
                <div class="setting-row-left">
                  <i class="fa fa-bookmark setting-row-icon"></i>
                  <span class="setting-row-label">常用书签</span>
                </div>
                <i class="fa fa-chevron-right setting-row-arrow"></i>
              </button>

              <button class="setting-row setting-row-btn" onclick="openWidgetManager('shortcuts')">
                <div class="setting-row-left">
                  <i class="fa fa-th setting-row-icon"></i>
                  <span class="setting-row-label">快捷方式</span>
                </div>
                <i class="fa fa-chevron-right setting-row-arrow"></i>
              </button>

              <button class="setting-row setting-row-btn" onclick="openWidgetManager('todo')">
                <div class="setting-row-left">
                  <i class="fa fa-check-square-o setting-row-icon"></i>
                  <span class="setting-row-label">待办事项</span>
                </div>
                <i class="fa fa-chevron-right setting-row-arrow"></i>
              </button>
            </div>
          </div>

          <div class="settings-group">
              <div class="settings-group-title">其他</div>
              <div class="settings-card">
                <button class="setting-row setting-row-btn" onclick="openAboutModal()">
                  <div class="setting-row-left">
                    <i class="fa fa-info-circle setting-row-icon"></i>
                    <span class="setting-row-label">关于搜索页</span>
                  </div>
                  <i class="fa fa-chevron-right setting-row-arrow"></i>
                </button>
              </div>
            </div>
          </div>

          <!-- ===== 搜索设置子页面 ===== -->
          <div class="nav-page" data-page="search">
            <div class="nav-page-header">
              <button class="nav-back-btn" onclick="window.navPage?.pop()">
                <i class="fa fa-chevron-left"></i> 设置
              </button>
              <span class="nav-page-header-title">搜索引擎设置</span>
            </div>
            <div class="settings-group">
              <div class="settings-card">
                <div class="setting-row">
                  <div class="setting-row-left">
                    <i class="fa fa-globe setting-row-icon"></i>
                    <span class="setting-row-label">默认搜索引擎</span>
                  </div>
                  <div class="ui-dropdown" id="settings-engine-dd"></div>
                </div>
                <div class="setting-row setting-row-clickable" onclick="openEngineManager()">
                  <div class="setting-row-left">
                    <i class="fa fa-sliders setting-row-icon"></i>
                    <span class="setting-row-label">搜索引擎管理</span>
                  </div>
                  <i class="fa fa-chevron-right setting-row-arrow"></i>
                </div>
              </div>
            </div>
            <div class="settings-group">
              <div class="settings-card">
                <div class="setting-row">
                  <div class="setting-row-left">
                    <i class="fa fa-lightbulb-o setting-row-icon"></i>
                    <span class="setting-row-label">搜索建议</span>
                  </div>
                  <div id="toggle-suggestions"></div>
                </div>
                <div class="setting-row">
                  <div class="setting-row-left">
                    <i class="fa fa-history setting-row-icon"></i>
                    <span class="setting-row-label">最近搜索</span>
                  </div>
                  <div id="toggle-recents"></div>
                </div>
              </div>
            </div>

            <div class="settings-group">
              <div class="settings-card">
                <button type="button" class="setting-row setting-row-btn setting-row-danger" onclick="resetSearchSystem()">
                  <div class="setting-row-left">
                    <i class="fa fa-refresh setting-row-icon icon-danger"></i>
                    <span class="setting-row-label label-danger">搜索系统重置</span>
                  </div>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 搜索引擎管理弹窗 -->
  <div id="engine-manager-modal" class="modal-overlay">
    <div class="modal-content glass">
      <div class="modal-header">
        <h3 class="modal-title">搜索引擎管理</h3>
        <button class="modal-close">
          <i class="fa fa-times"></i>
        </button>
      </div>
      <div class="engine-manager-body">
        <div class="engine-manager-section">
          <div class="engine-manager-section-title"><i class="fa fa-check-circle"></i> 已启用</div>
          <div id="engine-enabled-list" class="engine-sortable-list"></div>
        </div>
        <div class="engine-manager-section">
          <div class="engine-manager-section-title disabled-title"><i class="fa fa-plus-circle"></i> 未启用</div>
          <div id="engine-disabled-list" class="engine-sortable-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 统一管理弹窗 -->
  <div id="manage-modal" class="modal-overlay">
    <div class="modal-content glass manage-modal-content">
      <div class="modal-header">
        <h3 class="modal-title" id="manage-modal-title">管理</h3>
        <button class="modal-close">
          <i class="fa fa-times"></i>
        </button>
      </div>
      <div id="manage-list-container" class="manage-list"></div>
      <div class="manage-actions">
        <button class="setting-btn" id="manage-add-btn" onclick="manageAddItem()">
          <i class="fa fa-plus"></i> 添加
        </button>
      </div>
    </div>
  </div>

  <!-- 关于弹窗 -->
  <div id="about-modal" class="modal-overlay">
    <div class="modal-content glass" style="max-width: 360px;">
      <div class="modal-header">
        <h3 class="modal-title">关于</h3>
        <button class="modal-close">
          <i class="fa fa-times"></i>
        </button>
      </div>
      <div class="about-content" id="about-content"></div>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="./src/js/lib/widget-framework.js"></script>
  <script src="./src/js/lib/ui.js"></script>
  <script src="./src/js/lib/version.js"></script>
  <!-- 小组件（顺序无关） -->
  <script src="./src/js/widgets/clock.js"></script>
  <script src="./src/js/widgets/weather.js"></script>
  <script src="./src/js/widgets/todo.js"></script>
  <script src="./src/js/widgets/bookmarks.js"></script>
  <script src="./src/js/widgets/shortcuts.js"></script>
  <script src="./src/js/widgets/hotboard.js"></script>
  <script src="./src/js/widgets/time-progress.js"></script>
  <script src="./src/js/widgets/daily-word.js"></script>
  <!-- 应用逻辑 -->
  <script src="./src/js/app/app.js"></script>
  <script src="./src/js/app/preferences.js"></script>
  <script src="./src/js/app/admin.js"></script>
  <!-- API 层 -->
  <script src="./src/js/lib/uapi.js"></script>
</body>

</html>
