<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="KD起始页 - iOS风格简约美观的浏览器主页">
    <meta name="theme-color" content="#007AFF">
    <title>KD起始页</title>
    
    <!-- 外部资源 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="./main/css/main.css">
    <link rel="stylesheet" href="./main/css/root.css">
    
</head>

<body class="bg-gradient">
    <div class="bg-decoration">
        <div class="bg-bubble bg-bubble-1"></div>
        <div class="bg-bubble bg-bubble-2"></div>
        <div class="bg-bubble bg-bubble-3"></div>
    </div>
    <div class="container-main">
        <header class="header-bar">
            <div class="logo-section">
                <div class="logo-icon">KD</div>
                <span class="logo-text">起始页</span>
            </div>
            
            <div class="toolbar-actions">
                <div class="engine-switcher glass">
                    <button class="engine-btn" data-engine="baidu" onclick="setSearchEngine('baidu')">
                        <i class="fa fa-search"></i>
                        百度
                    </button>
                    <button class="engine-btn" data-engine="google" onclick="setSearchEngine('google')">
                        <i class="fa fa-google"></i>
                        Google
                    </button>
                    <button class="engine-btn active" data-engine="bing" onclick="setSearchEngine('bing')">
                        <i class="fa fa-edge"></i>
                        Bing
                    </button>
                </div>
                
                <button class="tool-btn glass" onclick="toggleDarkMode()">
                    <i id="theme-icon" class="fa fa-moon-o"></i>
                </button>
                
                <button class="tool-btn glass" onclick="openSettings()">
                    <i class="fa fa-cog"></i>
                </button>
            </div>
        </header>
        <section class="search-section">
            <div class="search-box glass">
                <i class="fa fa-search search-icon"></i>
                <input type="text" id="search-input" class="search-input" placeholder="搜索任何内容..." autocomplete="off">
                <button id="search-btn" class="search-btn">搜索</button>
            </div>
            <p class="search-hint">
                当前搜索引擎: <strong id="current-engine">Bing</strong>
            </p>
        </section>
        <section class="widgets-grid">
            <div class="widget widget-small glass" data-widget-id="time">
                <div class="widget-header">
                    <i class="fa fa-clock-o widget-icon"></i>
                    <span class="widget-title">时间</span>
                </div>
                <div id="time-display" class="time-display">00:00</div>
                <div id="date-display" class="date-display">2024年1月1日 星期一</div>
            </div>
            <div class="widget widget-small glass" data-widget-id="weather">
                <div class="widget-header">
                    <i class="fa fa-cloud widget-icon"></i>
                    <span class="widget-title">天气</span>
                </div>
                <div class="weather-content">
                    <i class="weather-icon" style="font-style: normal"></i>
                    <div>
                        <div class="weather-temp">出现错误</div>
                        <div class="weather-desc">错误</div>
                    </div>
                </div>
            </div>
            <div class="widget widget-small glass" data-widget-id="shortcuts">
                <div class="widget-header">
                    <i class="fa fa-th widget-icon"></i>
                    <span class="widget-title">快捷方式</span>
                    <button class="widget-add-btn" onclick="openManageModal('shortcuts')" title="管理快捷方式">
                        <i class="fa fa-plus"></i>
                    </button>
                </div>
                <div class="shortcuts-grid" id="shortcuts-grid">
                    <!-- 动态渲染 -->
                </div>
            </div>
            <div class="widget widget-small glass" data-widget-id="todo">
                <div class="widget-header">
                    <i class="fa fa-check-square-o widget-icon"></i>
                    <span class="widget-title">待办事项</span>
                    <button class="widget-add-btn" onclick="openManageModal('todos')" title="管理待办">
                        <i class="fa fa-cog"></i>
                    </button>
                </div>
                <div id="todo-list" class="todo-list">
                </div>
            </div>
        </section>
        <section class="large-widgets">
            <!-- 常用书签 -->
            <div class="widget glass" data-widget-id="bookmarks">
                <div class="widget-header">
                    <i class="fa fa-bookmark widget-icon"></i>
                    <span class="widget-title">常用书签</span>
                    <button class="widget-add-btn" onclick="openManageModal('bookmarks')" title="管理书签">
                        <i class="fa fa-plus"></i>
                    </button>
                </div>
                <div id="bookmarks-grid" class="bookmarks-grid">
                    <!-- 动态渲染 -->
                </div>
            </div>
            
            <!-- AI智能助手 -->
            <div class="widget glass" data-widget-id="ai-tools">
                <div class="widget-header">
                    <i class="fa fa-lightbulb-o widget-icon"></i>
                    <span class="widget-title">AI 智能助手</span>
                    <button class="widget-add-btn" onclick="openManageModal('ai-tools')" title="管理AI工具">
                        <i class="fa fa-plus"></i>
                    </button>
                </div>
                <p class="ai-description">快速访问 AI 工具，提升工作效率</p>
                <div id="ai-tools-grid" class="ai-tools-grid">
                    <!-- 动态渲染 -->
                </div>
            </div>
            <!-- 热榜 -->
            <div class="widget glass" data-widget-id="hotboard">
                <div class="widget-header">
                    <i class="fa fa-fire widget-icon"></i>
                    <span class="widget-title">实时热榜</span>
                    <button class="widget-add-btn" onclick="refreshHotboard()" title="刷新热榜">
                        <i class="fa fa-refresh"></i>
                    </button>
                </div>
                <div class="hotboard-meta">
                    <span class="hotboard-source-tag" id="hotboard-source-name">微博热搜</span>
                    <span class="hotboard-time" id="hotboard-update-time"></span>
                </div>
                <div id="hotboard-list" class="hotboard-list">
                    <div class="hotboard-loading">
                        <i class="fa fa-spinner fa-spin"></i>
                        <span>加载中...</span>
                    </div>
                </div>
            </div>
        </section>
    </div>
    
    <!-- 设置弹窗 -->
    <div id="settings-modal" class="modal-overlay">
    <div class="modal-content glass">
        <div class="modal-header">
            <h3 class="modal-title">设置</h3>
            <button class="modal-close" onclick="closeSettings()">
                <i class="fa fa-times"></i>
            </button>
        </div>

        <!-- 分区一：显示与偏好 -->
        <div class="settings-group">
            <div class="settings-group-title">显示与偏好</div>

            <div class="settings-card">
                <!-- 主题模式 -->
                <div class="setting-row">
                    <div class="setting-row-left">
                        <i class="fa fa-paint-brush setting-row-icon"></i>
                        <span class="setting-row-label">主题模式</span>
                    </div>
                    <div class="theme-buttons theme-buttons-inline">
                        <button class="theme-btn" data-theme="light" onclick="setTheme('light')">
                            <i class="fa fa-sun-o"></i>
                        </button>
                        <button class="theme-btn" data-theme="dark" onclick="setTheme('dark')">
                            <i class="fa fa-moon-o"></i>
                        </button>
                        <button class="theme-btn active" data-theme="auto" onclick="setTheme('auto')">
                            <i class="fa fa-desktop"></i>
                        </button>
                    </div>
                </div>

                <!-- 默认搜索引擎 -->
                <div class="setting-row">
                    <div class="setting-row-left">
                        <i class="fa fa-search setting-row-icon"></i>
                        <span class="setting-row-label">默认搜索引擎</span>
                    </div>
                    <select id="default-engine" class="setting-select-inline" onchange="saveDefaultEngine()">
                        <option value="bing">Bing</option>
                        <option value="baidu">百度</option>
                        <option value="google">Google</option>
                    </select>
                </div>

                <!-- 背景风格 -->
                <div class="setting-row">
                    <div class="setting-row-left">
                        <i class="fa fa-image setting-row-icon"></i>
                        <span class="setting-row-label">背景风格</span>
                    </div>
                    <div class="bg-options-inline">
                        <div class="bg-option active" onclick="setBackground('gradient', this)">渐变</div>
                        <div class="bg-option" onclick="setBackground('pure', this)">纯色</div>
                        <div class="bg-option" onclick="setBackground('custom', this)">自定义</div>
                    </div>
                </div>

                <!-- 热榜来源 -->
                <div class="setting-row">
                    <div class="setting-row-left">
                        <i class="fa fa-fire setting-row-icon"></i>
                        <span class="setting-row-label">热榜来源</span>
                    </div>
                    <select id="hotboard-source-select" class="setting-select-inline" onchange="saveHotboardSource()">
                        <option value="weibo">微博热搜</option>
                        <option value="zhihu">知乎热榜</option>
                        <option value="bilibili">B站热门</option>
                        <option value="baidu">百度热搜</option>
                        <option value="douyin">抖音热榜</option>
                        <option value="toutiao">今日头条</option>
                        <option value="36kr">36氪</option>
                        <option value="hupu">虎扑</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 分区二：内容管理 -->
        <div class="settings-group">
            <div class="settings-group-title">内容管理</div>

            <div class="settings-card">
                <button class="setting-row setting-row-btn" onclick="openManageModal('bookmarks')">
                    <div class="setting-row-left">
                        <i class="fa fa-bookmark setting-row-icon"></i>
                        <span class="setting-row-label">常用书签</span>
                    </div>
                    <i class="fa fa-chevron-right setting-row-arrow"></i>
                </button>

                <button class="setting-row setting-row-btn" onclick="openManageModal('ai-tools')">
                    <div class="setting-row-left">
                        <i class="fa fa-lightbulb-o setting-row-icon"></i>
                        <span class="setting-row-label">AI 智能助手</span>
                    </div>
                    <i class="fa fa-chevron-right setting-row-arrow"></i>
                </button>

                <button class="setting-row setting-row-btn" onclick="openManageModal('shortcuts')">
                    <div class="setting-row-left">
                        <i class="fa fa-th setting-row-icon"></i>
                        <span class="setting-row-label">快捷方式</span>
                    </div>
                    <i class="fa fa-chevron-right setting-row-arrow"></i>
                </button>

                <button class="setting-row setting-row-btn" onclick="openManageModal('todos')">
                    <div class="setting-row-left">
                        <i class="fa fa-check-square-o setting-row-icon"></i>
                        <span class="setting-row-label">待办事项</span>
                    </div>
                    <i class="fa fa-chevron-right setting-row-arrow"></i>
                </button>
            </div>
        </div>
    </div>
</div>
    
    <!-- 统一管理弹窗 -->
    <div id="manage-modal" class="modal-overlay">
        <div class="modal-content glass manage-modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="manage-modal-title">管理</h3>
                <button class="modal-close" onclick="closeManageModal()">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div id="manage-list-container" class="manage-list">
                <!-- 动态生成 -->
            </div>
            <div class="manage-actions">
                <button class="setting-btn" id="manage-add-btn" onclick="manageAddItem()">
                    <i class="fa fa-plus"></i> 添加
                </button>
            </div>
        </div>
    </div>
    
    <script src="./main/js/main.js" type="text/javascript" charset="utf-8"></script>
    <script src="./main/js/uapi.js" type="text/javascript" charset="utf-8"></script>
</body>

</html>
